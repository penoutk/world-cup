<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA World Cup 2026 Wall Chart</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --header: #1e3a8a;
      --header-text: #ffffff;
      --accent: #2563eb;
      --live: #22c55e;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: var(--header-text);
      padding: 0.75rem 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
    }

    header p {
      margin: 0;
      opacity: 0.9;
      font-size: 0.8rem;
    }

    main {
      max-width: 1700px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab {
      padding: 0.6rem 1.2rem;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.15s ease;
    }

    .tab.active {
      background: var(--header);
      color: var(--header-text);
      border-color: var(--header);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 1rem;
      justify-items: center;
    }

    .group-card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      min-width: 420px;
      max-width: 420px;
      width: 100%;
    }

    .group-header {
      background: var(--header);
      color: var(--header-text);
      padding: 0.55rem 0.75rem;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.03em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .group-header .status {
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
    }

    .standings {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      table-layout: fixed;
    }

    .standings th {
      background: #f1f5f9;
      color: var(--muted);
      font-weight: 700;
      padding: 0.35rem 0.25rem;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .standings td {
      padding: 0.35rem 0.25rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .standings th:nth-child(1),
    .standings td:nth-child(1) { width: 24px; text-align: center; }
    .standings th:nth-child(2) { width: 120px; text-align: center; }
    .standings td:nth-child(2) { width: 120px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .standings th:nth-child(3),
    .standings td:nth-child(3),
    .standings th:nth-child(4),
    .standings td:nth-child(4),
    .standings th:nth-child(5),
    .standings td:nth-child(5),
    .standings th:nth-child(6),
    .standings td:nth-child(6),
    .standings th:nth-child(7),
    .standings td:nth-child(7),
    .standings th:nth-child(8),
    .standings td:nth-child(8) { width: 32px; }
    .standings tr:last-child td { border-bottom: none; }
    .standings tr.qualified td:first-child { font-weight: 700; }
    .standings tr.qualified { background: #f0fdf4; }
    .standings th:last-child,
    .standings td.form {
      width: 56px;
      min-width: 56px;
      max-width: 56px;
      text-align: center;
      white-space: nowrap;
      padding-left: 2px;
      padding-right: 2px;
      overflow: hidden;
    }
    .form-tooltip {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      width: 12px;
      height: 12px;
      margin: 0 1px;
    }
    .form-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .form-dot.win { background: #22c55e; }
    .form-dot.draw { background: #94a3b8; }
    .form-dot.loss { background: #ef4444; }
    /* .form-dot.empty { background: #0f172a; }     */
    .form-dot.empty { background: #d1d5db; }
    .form-tooltip .tooltip-text {
      display: none;
      position: fixed;
      padding: 0.45rem 0.7rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .form-tooltip:hover .tooltip-text,
    .form-tooltip:focus .tooltip-text {
      display: block;
    }
    .form-tooltip.win .tooltip-text { background: #22c55e; }
    .form-tooltip.draw .tooltip-text { background: #94a3b8; }
    .form-tooltip.loss .tooltip-text { background: #ef4444; }
    .form-tooltip.empty .tooltip-text { background: #d1d5db; color: #1f2937; }

    .team-name {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .flag { font-size: 1rem; line-height: 1; }

    .fixtures {
      padding: 0.6rem;
      background: #fafafa;
      border-top: 1px solid var(--border);
    }

    .fixture {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-areas:
        "home score away"
        "meta meta meta";
      gap: 0.35rem;
      align-items: center;
      padding: 0.35rem 0;
      font-size: 0.76rem;
      border-bottom: 1px dashed var(--border);
    }

    .fixture:last-child { border-bottom: none; }
    .fixture .home {
      grid-area: home;
      justify-self: start;
      text-align: left;
    }
    .fixture .away {
      grid-area: away;
      justify-self: end;
      text-align: right;
    }
    .fixture .score {
      grid-area: score;
      font-weight: 800;
      min-width: 44px;
      text-align: center;
      background: #e2e8f0;
      border-radius: 4px;
      padding: 0.1rem 0.3rem;
      font-size: 0.8rem;
    }
    .fixture .score.live { background: #dcfce7; color: #166534; }
    .fixture .score.upcoming { background: #f1f5f9; color: var(--muted); }
    .fixture .fixture-meta {
      grid-area: meta;
      justify-self: center;
    }

    /* Third place panel */
    .third-place-card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
    }

    .third-place-header {
      background: var(--header);
      color: var(--header-text);
      padding: 0.75rem 1rem;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
    }

    .third-place-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .third-place-table th {
      background: #f1f5f9;
      color: var(--muted);
      font-weight: 700;
      padding: 0.55rem 0.75rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .third-place-table td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .third-place-table tr:last-child td { border-bottom: none; }
    .third-place-table td:first-child { text-align: center; font-weight: 700; }
    .third-place-table td:nth-child(2) { text-align: left; }
    .third-place-table td:nth-child(3) { text-align: left; }
    .third-place-table tr.qualified td:first-child { color: #16a34a; }
    .third-place-table tr.qualified { background: #f0fdf4; }
    .third-place-table tr.provisional {
      background: #fefce8;
    }
    .third-place-table tr.provisional td:first-child { color: #ca8a04; }
    .third-place-table tr.eliminated { background: #fef2f2; }
    .third-place-table td .group-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      background: #f1f5f9;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
    }
    .third-place-note {
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      background: #fafafa;
      border-top: 1px solid var(--border);
    }

    @media print {
      .third-place-card { box-shadow: none; border: 1px solid #cbd5e1; }
      .third-place-table { font-size: 0.8rem; }
      .third-place-table th, .third-place-table td { padding: 0.4rem 0.5rem; }
    }

    /* Teams panel cards */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      max-width: 1400px;
      margin: 0 auto;
      align-items: stretch;
    }

    .person-card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .person-header {
      background: var(--header);
      color: var(--header-text);
      padding: 0.75rem 1rem;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
    }

    .person-teams {
      padding: 0.85rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45rem 0.75rem;
      flex: 1;
    }

    .person-team {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.84rem;
      padding: 0.15rem 0.35rem;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }

    .person-team.advanced {
      background-color: rgba(34, 197, 94, 0.18);
      color: #14532d;
    }

    .person-team.eliminated {
      background-color: rgba(239, 68, 68, 0.18);
      color: #7f1d1d;
    }

    .person-team.provisional {
      background-color: rgba(234, 179, 8, 0.18);
      color: #713f12;
    }

    .person-team .flag { font-size: 1.1rem; }

    @media (max-width: 1100px) {
      .teams-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .teams-grid { grid-template-columns: 1fr; }
    }

    /* Leaderboard panel */
    .leaderboard-card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      max-width: 700px;
      margin: 0 auto;
      overflow: hidden;
    }

    .leaderboard-header {
      background: var(--header);
      color: var(--header-text);
      padding: 0.75rem 1rem;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .leaderboard-table th {
      background: #f1f5f9;
      color: var(--muted);
      font-weight: 700;
      padding: 0.55rem 0.75rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .leaderboard-table td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .leaderboard-table tr:last-child td { border-bottom: none; }
    .leaderboard-table td:first-child { text-align: left; font-weight: 700; }
    .leaderboard-table td:first-child .medal { margin-right: 0.4rem; }
    .leaderboard-table td:nth-child(3) { font-weight: 800; color: var(--header); }

    .fixture-meta {
      grid-column: 1 / -1;
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      margin-top: -0.1rem;
      margin-bottom: 0.1rem;
    }

    /* Knockout bracket chart styles */
    #bracket {
      position: relative;
      overflow-x: auto;
      padding: 1rem 0;
    }

    .knockout-wrapper {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.5rem;
      align-items: center;
      min-width: 1250px;
      padding: 0 1rem;
      margin: 0 auto;
      position: relative;
    }

    .knockout-half {
      display: flex;
      justify-content: center;
    }

    .ko-side {
      display: grid;
      grid-template-columns: repeat(3, 170px);
      gap: 1.75rem;
      align-items: center;
    }

    .knockout-half.right .ko-side { direction: rtl; }
    .knockout-half.right .ko-side > * { direction: ltr; }

    .ko-column {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 1.25rem;
      min-height: 760px;
    }

    .ko-pair {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      position: relative;
    }

    .ko-match-box {
      background: var(--surface);
      border: 2px solid var(--header);
      border-radius: 10px;
      padding: 0.55rem;
      font-size: 0.78rem;
      width: 170px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }

    .ko-match-title {
      background: var(--header);
      color: var(--header-text);
      font-weight: 800;
      font-size: 0.68rem;
      padding: 0.25rem 0.4rem;
      margin: -0.55rem -0.55rem 0.35rem;
      border-radius: 7px 7px 0 0;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .ko-match-date {
      font-size: 0.58rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.3rem;
      line-height: 1.3;
    }

    .ko-team-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
    }

    .ko-team-row:last-child { border-bottom: none; }

    .ko-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      position: relative;
    }

    .ko-center .ko-pair.single { display: flex; justify-content: center; }

    .ko-center .ko-match-box {
      width: 210px;
      font-size: 0.88rem;
    }

    .ko-center .ko-match-title { font-size: 0.78rem; }
    .ko-center .ko-match-date { font-size: 0.62rem; }

    .ko-center .final .ko-match-box,
    .ko-center .third .ko-match-box { width: 250px; }

    .ko-center .sf-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      width: 100%;
    }

    .bracket-svg {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 2;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .legend span { display: inline-flex; align-items: center; gap: 0.35rem; }

    /* .empty { text-align: center; color: var(--muted); padding: 2rem; } */

    .print-actions {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .print-actions button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .print-actions button:hover { background: #f1f5f9; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    footer a { color: var(--header); }

    @media print {
      @page { margin: 0.3cm; }
      header { position: static; background: #1e3a8a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 0.4rem 0.75rem; }
      header h1 { font-size: 1rem; margin: 0; }
      header p { font-size: 0.68rem; }
      .tabs, .print-actions, .legend { display: none !important; }
      .panel { display: block !important; }
      .group-card { break-inside: avoid; box-shadow: none; border: 1px solid #cbd5e1; }
      body { background: #fff; }
      main { max-width: 100%; padding: 0.25rem 0.4rem; }
      .groups-grid { grid-template-columns: repeat(2, 1fr); gap: 0.45rem; justify-items: stretch; }
      .group-card { min-width: 0; max-width: none; }
      .standings { font-size: 0.72rem; }
      .standings th, .standings td { padding: 0.18rem 0.15rem; }
      .standings th:last-child, .standings td.form { width: 52px; min-width: 52px; max-width: 52px; }
      .form-dot { width: 6px; height: 6px; }
      .form-tooltip { width: 10px; height: 10px; margin: 0 1px; }
      .fixtures { padding: 0.35rem; }
      .fixture { font-size: 0.68rem; padding: 0.18rem 0; }
      .fixture .home { text-align: left; }
      .fixture .away { text-align: right; }
      .fixture-meta { font-size: 0.56rem; }
      .group-header { padding: 0.3rem 0.45rem; font-size: 0.82rem; }
      .knockout-wrapper { min-width: 100%; gap: 0.75rem; }
      .ko-side { grid-template-columns: repeat(3, 130px); gap: 0.9rem; }
      .ko-match-box { width: 130px; font-size: 0.66rem; }
      .ko-center { gap: 0.75rem; }
      .ko-center .ko-match-box { width: 140px; font-size: 0.68rem; }
      .ko-center .final .ko-match-box,
      .ko-center .third .ko-match-box { width: 170px; }
      .teams-grid { grid-template-columns: repeat(2, 1fr); gap: 0.45rem; }
      .person-card { break-inside: avoid; box-shadow: none; border: 1px solid #cbd5e1; }
      .person-header { padding: 0.35rem 0.5rem; font-size: 0.9rem; }
      .person-teams { padding: 0.4rem; gap: 0.2rem 0.4rem; }
      .person-team { font-size: 0.72rem; }
      .leaderboard-card { box-shadow: none; border: 1px solid #cbd5e1; }
      .leaderboard-table { font-size: 0.8rem; }
      .leaderboard-table th, .leaderboard-table td { padding: 0.4rem 0.5rem; }
    }

    @media (max-width: 640px) {
      .groups-grid { grid-template-columns: 1fr; }
      .group-card { min-width: 100%; max-width: 100%; }
      .standings { font-size: 0.8rem; }
      .fixture { font-size: 0.78rem; }
      .fixture .home { justify-self: start; text-align: left; }
      .fixture .away { justify-self: end; text-align: right; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚽ FIFA World Cup 2026 Wall Chart</h1>
    <p>48 nations · 104 matches · Canada, USA &amp; Mexico</p>
  </header>

  <main>
    <div class="tabs">
      <button class="tab active" data-panel="groupsPanel">Groups</button>
      <button class="tab" data-panel="thirdPlacePanel">3rd Place</button>
      <button class="tab" data-panel="bracketPanel">Knockout</button>
      <button class="tab" data-panel="teamsPanel">Teams</button>
      <button class="tab" data-panel="leaderboardPanel">Leaderboard</button>
    </div>

    <div class="legend">
      <span><span class="flag">🟢</span> Qualified positions (top 2 + best 3rd)</span>
      <span><span class="flag">🏆</span> Data from openfootball/worldcup</span>
    </div>

    <div class="print-actions">
      <button onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>

    <section id="groupsPanel" class="panel active">
      <div id="groupsGrid" class="groups-grid"></div>
    </section>

    <section id="thirdPlacePanel" class="panel">
      <div id="thirdPlace" class="third-place"></div>
    </section>

    <section id="bracketPanel" class="panel">
      <div id="bracket" class="bracket"></div>
    </section>

    <section id="teamsPanel" class="panel">
      <div id="teams" class="teams"></div>
    </section>

    <section id="leaderboardPanel" class="panel">
      <div id="leaderboard" class="leaderboard"></div>
    </section>
  </main>

  <footer>
    Built with embedded data from the <a href="https://github.com/openfootball/worldcup/tree/master/2026--usa" target="_blank" rel="noopener">openfootball/worldcup 2026 dataset</a>. No API key required.
  </footer>

  <script>
    // ===== Fallback 2026 World Cup data (from openfootball/worldcup) =====
    const WC_DATA = {
      "groups": {
        "A": ["Mexico", "South Africa", "South Korea", "Czech Republic"],
        "B": ["Canada", "Bosnia & Herzegovina", "Qatar", "Switzerland"],
        "C": ["Brazil", "Morocco", "Haiti", "Scotland"],
        "D": ["USA", "Paraguay", "Australia", "Turkey"],
        "E": ["Germany", "Curaçao", "Ivory Coast", "Ecuador"],
        "F": ["Netherlands", "Japan", "Sweden", "Tunisia"],
        "G": ["Belgium", "Egypt", "Iran", "New Zealand"],
        "H": ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"],

    // ===== Live data fetch from openfootball/worldcup =====
    const DATA_URLS = {
      groups: 'https://raw.githubusercontent.com/openfootball/worldcup/master/2026--usa/cup.txt',
      finals: 'https://raw.githubusercontent.com/openfootball/worldcup/master/2026--usa/cup_finals.txt'
    };

    function parseMatchLine(line, group, date) {
      const trimmed = line.trim();
      if (!trimmed) return null;

      //  13:00 UTC-6     Mexico  2-0 (1-0)  South Africa        @ Mexico City
      //  12:00 UTC-4     Czech Republic    v South Africa   @ Atlanta
      const header = trimmed.match(/^(\d{2}:\d{2})\s+UTC([+-]\d)\s+(.+?)\s+@\s+(.+)$/);
      if (!header) return null;

      const [, time, utcOffset, leftPart, venue] = header;
      const scoreMatch = leftPart.match(/^(.*?)\s+(\d+-\d+(?:\s*\(\d+-\d+\))?|v)\s+(.+)$/);
      if (!scoreMatch) return null;

      const home = scoreMatch[1].trim();
      const scoreText = scoreMatch[2].trim();
      const away = scoreMatch[3].trim();

      let homeScore = null, awayScore = null, played = false;
      if (scoreText !== 'v') {
        const scores = scoreText.match(/^(\d+)-(\d+)/);
        if (scores) {
          homeScore = parseInt(scores[1], 10);
          awayScore = parseInt(scores[2], 10);
          played = true;
        }
      }

      return { group, date, time, utcOffset, home, away, homeScore, awayScore, played, venue: venue.trim() };
    }

    function parseCupText(text) {
      const groups = {};
      const matches = [];
      const lines = text.replace(/\r/g, '').split('\n');
      let currentGroup = null;
      let currentDate = null;

      for (const line of lines) {
        // Group A | Mexico        South Africa    South Korea    Czech Republic
        const groupDef = line.match(/^Group\s+([A-L])\s*\|\s*(.+)$/);
        if (groupDef) {
          const groupName = groupDef[1];
          groups[groupName] = groupDef[2].trim().split(/\s{2,}/).map(t => t.trim()).filter(Boolean);
          continue;
        }

        // ▪ Group A
        const groupSection = line.match(/^▪\s+Group\s+([A-L])$/);
        if (groupSection) {
          currentGroup = groupSection[1];
          currentDate = null;
          continue;
        }

        // Thu June 11
        const dateLine = line.match(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+June\s+(\d{1,2})$/);
        if (dateLine) {
          currentDate = `${dateLine[1]} June ${dateLine[2]}`;
          continue;
        }

        if (currentGroup && currentDate) {
          const match = parseMatchLine(line, currentGroup, currentDate);
          if (match) matches.push(match);
        }
      }

      return { groups, matches };
    }

    function parseFinalMatchLine(line, round, date) {
      const trimmed = line.trim();
      if (!trimmed) return null;

      // (73) 12:00 UTC-7  2A v 2B           @ Los Angeles (Inglewood)
      const header = trimmed.match(/^\((\d+)\)\s+(\d{2}:\d{2})\s+UTC([+-]\d)\s+(.+?)\s+@\s+(.+)$/);
      if (!header) return null;

      const [, numStr, time, utcOffset, teamsPart, venue] = header;
      const teamsMatch = teamsPart.match(/^(.+?)\s+v\s+(.+)$/);
      if (!teamsMatch) return null;

      return {
        round,
        date,
        num: parseInt(numStr, 10),
        time,
        utcOffset,
        home: teamsMatch[1].trim(),
        away: teamsMatch[2].trim(),
        venue: venue.trim()
      };
    }

    function parseCupFinalsText(text) {
      const knockouts = [];
      const roundMap = {
        'Round of 32': 'R32',
        'Round of 16': 'R16',
        'Quarter-final': 'QF',
        'Semi-final': 'SF',
        'Match for third place': '3P',
        'Final': 'F'
      };

      const lines = text.replace(/\r/g, '').split('\n');
      let currentRound = null;
      let currentDate = null;

      for (const line of lines) {
        const trimmed = line.trim();

        // ▪ Round of 32
        const roundLine = line.match(/^▪\s+(.+)$/);
        if (roundLine) {
          const name = roundLine[1].trim();
          currentRound = roundMap[name] || name;
          currentDate = null;
          continue;
        }

        // Sun Jun 28
        const dateLine = trimmed.match(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+(Jun|June|Jul)\s+(\d{1,2})\s*$/);
        if (dateLine) {
          currentDate = `${dateLine[1]} ${dateLine[2]} ${dateLine[3]}`;
          continue;
        }

        if (currentRound && currentDate) {
          const match = parseFinalMatchLine(line, currentRound, currentDate);
          if (match) knockouts.push(match);
        }
      }

      return knockouts;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(url, { ...options, signal: controller.signal });
        return response;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function fetchLatestData() {
      const cacheBuster = `?nocache=${Date.now()}`;
      const fetchOptions = { cache: 'no-store' };
      const [groupsResp, finalsResp] = await Promise.all([
        fetchWithTimeout(DATA_URLS.groups + cacheBuster, fetchOptions),
        fetchWithTimeout(DATA_URLS.finals + cacheBuster, fetchOptions)
      ]);

      if (!groupsResp.ok) throw new Error(`Groups fetch failed: ${groupsResp.status}`);
      if (!finalsResp.ok) throw new Error(`Finals fetch failed: ${finalsResp.status}`);

      const cupText = await groupsResp.text();
      const finalsText = await finalsResp.text();

      const { groups, matches } = parseCupText(cupText);
      const knockouts = parseCupFinalsText(finalsText);

      if (!Object.keys(groups).length || !matches.length) {
        throw new Error('Parsed data appears empty');
      }

      return { groups, matches, knockouts };
    }

    async function loadAndRender() {
      const grid = document.getElementById('groupsGrid');
      const bracket = document.getElementById('bracket');
      grid.innerHTML = '<p class="empty">Loading latest data from openfootball…</p>';
      bracket.innerHTML = '<p class="empty">Loading latest data from openfootball…</p>';

      try {
        const fresh = await fetchLatestData();
        WC_DATA.groups = fresh.groups;
        WC_DATA.matches = fresh.matches;
        WC_DATA.knockouts = fresh.knockouts;

    const TEAMS_FALLBACK = {

    function parseTeamsMd(text) {
      const owners = {};
      let current = null;
      text.replace(/\r/g, '').split('\n').forEach(line => {
        const header = line.match(/^##\s+(.+)$/);
        if (header) {
          current = header[1].trim();
          owners[current] = [];
        } else if (current && /^-\s+/.test(line.trim())) {
          owners[current].push(line.trim().replace(/^-\s+/, '').trim());
        }
      });
      return owners;
    }

    async function loadTeamsMd() {

        const resp = await fetchWithTimeout('teams.md', { cache: 'no-store' }, 5000);
        if (!resp.ok) throw new Error(resp.statusText);
        const text = await resp.text();
        const parsed = parseTeamsMd(text);
        if (!Object.keys(parsed).length) throw new Error('teams.md appears empty');
        return parsed;
      } catch (err) {
        console.warn('Could not load teams.md, using embedded fallback:', err);
        return TEAMS_FALLBACK;

    // ===== Helper: compute 3rd place mathematical status =====
    // Returns: 'confirmed' | 'provisional' | 'competing' | 'eliminated'
    function getThirdPlaceMathStatus(teamName) {
      const allGroups = Object.keys(WC_DATA.groups);
      
      // Collect all 3rd-place teams
      const thirdPlaceTeams = [];
      allGroups.forEach(group => {
        const groupMatches = WC_DATA.matches.filter(m => m.group === group);
        const groupStarted = groupMatches.some(m => m.played);
        if (groupStarted) {
          const standings = computeStandings(group, WC_DATA.groups[group], WC_DATA.matches);
          if (standings.length >= 3) {
            thirdPlaceTeams.push({ ...standings[2], group });
          }
        }
      });
      
      if (thirdPlaceTeams.length === 0) return null;
      
      // Sort by points, GD, GF, name
      thirdPlaceTeams.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.gd !== a.gd) return b.gd - a.gd;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.name.localeCompare(b.name);
      });
      
      // Find this team
      const teamIndex = thirdPlaceTeams.findIndex(r => r.name === teamName);
      if (teamIndex === -1) return null;
      const team = thirdPlaceTeams[teamIndex];
      
      // Check group completion
      const groupMatches = WC_DATA.matches.filter(m => m.group === team.group);
      const groupComplete = groupMatches.length > 0 && groupMatches.every(m => m.played);
      const hasRemainingMatches = !groupComplete;
      const isInTop8 = teamIndex < 8;
      
      // Calculate max possible points for all teams
      const groupCompleteStatus = {};
      allGroups.forEach(g => {
        const matches = WC_DATA.matches.filter(m => m.group === g);
        groupCompleteStatus[g] = matches.length > 0 && matches.every(m => m.played);
      });
      
      const maxPossiblePoints = {};
      thirdPlaceTeams.forEach(r => {
        if (!groupCompleteStatus[r.group]) {
          const remainingMatches = 3 - r.p;
          maxPossiblePoints[r.name] = r.pts + (remainingMatches * 3);
        } else {
          maxPossiblePoints[r.name] = r.pts;
        }
      });
      
      // Worst-case scenario: all remaining teams win their matches
      const worstCaseStandings = thirdPlaceTeams.map(r => ({
        ...r,
        worstCasePts: maxPossiblePoints[r.name],
        worstCaseGd: r.gd + (3 - r.p) * 5
      }));
      
      worstCaseStandings.sort((a, b) => {
        if (b.worstCasePts !== a.worstCasePts) return b.worstCasePts - a.worstCasePts;
        if (b.worstCaseGd !== a.worstCaseGd) return b.worstCaseGd - a.worstCaseGd;
        if (b.gd !== a.gd) return b.gd - a.gd;
        return a.name.localeCompare(b.name);
      });
      
      const worstCaseTop8 = new Set(worstCaseStandings.slice(0, 8).map(r => r.name));
      const isSafeInWorstCase = worstCaseTop8.has(teamName);
      
      // Check if team can reach top 8 (not eliminated)
      function canReachTop8(name) {
        const t = thirdPlaceTeams.find(r => r.name === name);
        if (!t) return false;
        if (!groupCompleteStatus[t.group]) return true; // Still playing
        
        const teamsAhead = thirdPlaceTeams.filter(r => {
          if (r.name === name) return false;
          if (r.pts > t.pts) return true;
          if (r.pts === t.pts && r.gd > t.gd) return true;
          if (r.pts === t.pts && r.gd === t.gd && r.gf > t.gf) return true;
          return false;
        });
        
        return teamsAhead.length < 8;
      }
      
      const teamCanReachTop8 = canReachTop8(teamName);
      
      if (hasRemainingMatches) {
        return 'competing';
      } else if (isInTop8 && isSafeInWorstCase) {
        return 'confirmed';
      } else if (isInTop8 && !isSafeInWorstCase) {
        return 'provisional';
      } else if (!isInTop8 && !teamCanReachTop8) {
        return 'eliminated';
      } else {
        return 'competing';
      }
    }

    function getTeamAdvancementStatus(teamName) {
      const normalized = normaliseTeamName(teamName);

      let groupName = null;
      for (const [g, teams] of Object.entries(WC_DATA.groups)) {
        if (teams.includes(normalized)) {
          groupName = g;
          break;
        }
      }
      if (!groupName) return null;

      const groupMatches = WC_DATA.matches.filter(m => m.group === groupName);
      const groupStarted = groupMatches.some(m => m.played);
      const groupComplete = groupMatches.length > 0 && groupMatches.every(m => m.played);
      
      if (!groupStarted) return null;

      const standings = computeStandings(groupName, WC_DATA.groups[groupName], WC_DATA.matches);
      const rank = standings.findIndex(r => r.name === normalized);
      if (rank === -1) return null;

      if (rank < 2) {
        // Top 2 - direct qualification, always advanced
        return 'advanced';
      }
      if (rank === 2) {
        // 3rd place - use mathematical certainty logic
        const thirdStatus = getThirdPlaceMathStatus(normalized);
        if (thirdStatus === 'confirmed') return 'advanced';
        if (thirdStatus === 'provisional') return 'provisional';
        if (thirdStatus === 'eliminated') return 'eliminated';
        return 'provisional'; // competing
      }
      // 4th place
      return groupComplete ? 'eliminated' : 'provisional';
    }

    async function renderLeaderboard() {
      const container = document.getElementById('leaderboard');
      container.innerHTML = '<p class="empty">Loading leaderboard…</p>';

      const owners = await loadTeamsMd();

      // Map each known team name to the variant used by the live WC_DATA groups.
      const allGroupTeams = Object.values(WC_DATA.groups).flat();
      const teamRecords = {};
      allGroupTeams.forEach(t => { teamRecords[t] = { w: 0, d: 0, l: 0 }; });

      WC_DATA.matches.filter(m => m.played).forEach(m => {
        if (m.homeScore > m.awayScore) {
          teamRecords[m.home].w++;
          teamRecords[m.away].l++;
        } else if (m.awayScore > m.homeScore) {
          teamRecords[m.away].w++;
          teamRecords[m.home].l++;
        } else {
          teamRecords[m.home].d++;
          teamRecords[m.away].d++;
        }
      });

      // Build a map from normalised names to the actual group-team keys and their records.
      const normalisedToGroupName = {};
      allGroupTeams.forEach(t => { normalisedToGroupName[normaliseTeamName(t)] = t; });

      function recordForTeam(t) {
        const normalised = normaliseTeamName(t);
        const groupName = normalisedToGroupName[normalised] || t;
        return teamRecords[groupName] || { w: 0, d: 0, l: 0 };
      }

      const rows = Object.entries(owners).map(([name, teams]) => {
        const totals = teams.reduce((acc, t) => {
          const rec = recordForTeam(t);
          acc.w += rec.w;
          acc.d += rec.d;
          acc.l += rec.l;
          return acc;
        }, { w: 0, d: 0, l: 0 });
        return { name, ...totals };
      }).sort((a, b) => b.w - a.w || a.l - b.l || b.d - a.d);

      const medals = ['🥇', '🥈', '🥉', '4️⃣'];
      container.innerHTML = `
        <div class="leaderboard-card">
          <div class="leaderboard-header">🏆 Leaderboard — Records by Owner</div>

            <thead>
              <tr><th>#</th><th>Person</th><th>Wins</th><th>Draws</th><th>Losses</th></tr>

                <tr>
                  <td>${i + 1}</td>

                  <td class="points"><strong>${r.w}</strong></td>
                  <td>${r.d}</td>
                  <td>${r.l}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

    function shortName(name) {

    // ===== Standings calculation =====
    function computeStandings(groupName, teams, matches) {
      const table = {};
      teams.forEach(t => {
        table[t] = { name: t, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0, form: [] };
      });

      matches.filter(m => m.group === groupName && m.played).forEach(m => {
        const home = table[m.home];
        const away = table[m.away];
        home.p++; away.p++;
        home.gf += m.homeScore; home.ga += m.awayScore;
        away.gf += m.awayScore; away.ga += m.homeScore;

        if (m.homeScore > m.awayScore) {
          home.w++; away.l++; home.pts += 3;
          home.form.push('W');
          away.form.push('L');
        } else if (m.homeScore < m.awayScore) {
          away.w++; home.l++; away.pts += 3;
          home.form.push('L');
          away.form.push('W');
        } else {
          home.d++; away.d++; home.pts += 1; away.pts += 1;
          home.form.push('D');
          away.form.push('D');
        }
      });

      Object.values(table).forEach(r => { r.gd = r.gf - r.ga; });

      return Object.values(table).sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.gd !== a.gd) return b.gd - a.gd;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.name.localeCompare(b.name);
      });
    }

    function renderForm(formArray) {
      const last3 = formArray.slice(-3);
      while (last3.length < 3) last3.push(null);
      return last3.map(r => {
        let fill, stroke, cls;
        if (r === 'W') { fill = '#22c55e'; cls = 'win'; }
        else if (r === 'D') { fill = '#94a3b8'; cls = 'draw'; }
        else if (r === 'L') { fill = '#ef4444'; cls = 'loss'; }
        else { fill = '#ffffff'; stroke = '#d1d5db'; cls = 'empty'; }
        const strokeAttr = stroke ? ` stroke="${stroke}" stroke-width="1"` : '';
        const label = r ? (r === 'W' ? 'Win' : r === 'D' ? 'Draw' : 'Loss') : 'Not played';
        return `
          <span class="form-tooltip ${cls}" aria-label="${label}" onmouseover="positionFormTooltip(this)" onfocus="positionFormTooltip(this)">
            <span class="form-dot ${cls}" role="img" aria-label="${label}"></span>
            <span class="tooltip-text" role="tooltip">${label}</span>
          </span>
        `;
      }).join('');
    }

    function positionFormTooltip(el) {
      const tooltip = el.querySelector('.tooltip-text');
      if (!tooltip) return;
      const rect = el.getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      const top = rect.top - tooltipRect.height - 6;
      const left = rect.left + rect.width / 2 - tooltipRect.width / 2;
      tooltip.style.top = `${Math.max(4, top)}px`;
      tooltip.style.left = `${Math.max(4, Math.min(window.innerWidth - tooltipRect.width - 4, left))}px`;
    }

    // ===== Render 3rd place standings panel =====
    function renderThirdPlace() {
      const container = document.getElementById('thirdPlace');
      
      // Collect all 3rd-place teams from each group
      const allGroups = Object.keys(WC_DATA.groups);
      const thirdPlaceTeams = [];
      
      allGroups.forEach(group => {
        const groupMatches = WC_DATA.matches.filter(m => m.group === group);
        const groupStarted = groupMatches.some(m => m.played);
        
        if (groupStarted) {
          const standings = computeStandings(group, WC_DATA.groups[group], WC_DATA.matches);
          if (standings.length >= 3) {
            const third = standings[2];
            thirdPlaceTeams.push({ ...third, group });
          }
        }
      });
      
      if (thirdPlaceTeams.length === 0) {
        container.innerHTML = '<p class="empty">No matches played yet. 3rd place standings will appear here once groups begin.</p>';
        return;
      }
      
      // Sort by points, then goal difference, then goals for, then name
      thirdPlaceTeams.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.gd !== a.gd) return b.gd - a.gd;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.name.localeCompare(b.name);
      });
      
      // Check which groups are complete (all 6 matches played)
      const groupCompleteStatus = {};
      allGroups.forEach(g => {
        const groupMatches = WC_DATA.matches.filter(m => m.group === g);
        groupCompleteStatus[g] = groupMatches.length > 0 && groupMatches.every(m => m.played);
      });
      
      // Calculate max possible points for each team with remaining matches
      const maxPossiblePoints = {};
      thirdPlaceTeams.forEach(r => {
        if (!groupCompleteStatus[r.group]) {
          const remainingMatches = 3 - r.p;
          maxPossiblePoints[r.name] = r.pts + (remainingMatches * 3);
        } else {
          maxPossiblePoints[r.name] = r.pts;
        }
      });
      
      // Simulate worst-case scenario: all remaining teams win their matches
      // Create a copy of standings with worst-case points
      const worstCaseStandings = thirdPlaceTeams.map(r => ({
        ...r,
        worstCasePts: maxPossiblePoints[r.name],
        worstCaseGd: r.gd + (3 - r.p) * 5 // Assume they win big (+5 GD per win)
      }));
      
      // Sort by worst-case points (descending), then worst-case GD, then current GD, then name
      worstCaseStandings.sort((a, b) => {
        if (b.worstCasePts !== a.worstCasePts) return b.worstCasePts - a.worstCasePts;
        if (b.worstCaseGd !== a.worstCaseGd) return b.worstCaseGd - a.worstCaseGd;
        if (b.gd !== a.gd) return b.gd - a.gd;
        return a.name.localeCompare(b.name);
      });
      
      // Find which teams are still in top 8 in the worst case
      const worstCaseTop8 = new Set(worstCaseStandings.slice(0, 8).map(r => r.name));
      
      // For teams with complete groups, check if they are eliminated by counting
      // how many teams are currently ahead of them (more pts, or same pts + better GD)
      function isTeamEliminated(teamName) {
        const team = thirdPlaceTeams.find(r => r.name === teamName);
        if (!team) return false;
        if (!groupCompleteStatus[team.group]) return false; // Not eliminated if still playing
        
        // Count ALL teams that are currently ahead (more pts, or same pts + better GD, or same pts/GD + more goals)
        const teamsAhead = thirdPlaceTeams.filter(r => {
          if (r.name === teamName) return false;
          if (r.pts > team.pts) return true; // More points = ahead
          if (r.pts === team.pts && r.gd > team.gd) return true; // Same points, better GD = ahead
          if (r.pts === team.pts && r.gd === team.gd && r.gf > team.gf) return true; // Same pts/GD, more goals = ahead
          return false;
        });
        
        // If 8 or more teams are currently ahead, this team is eliminated
        return teamsAhead.length >= 8;
      }
      
      // Determine per-team status based on mathematical certainty:
      // - CONFIRMED (✅): Group complete AND team is in top 8 even in worst-case scenario
      // - PROVISIONAL (⏳): Group complete AND in top 8 now BUT could be pushed out in worst case
      // - STILL COMPETING (⏳): Has remaining matches (can still improve position)
      // - ELIMINATED (❌): Group complete AND NOT in top 8 now AND cannot reach top 8 even in best case
      container.innerHTML = `
        <div class="third-place-card">
          <div class="third-place-header">🥉 3rd Place Standings — Best 8 Advance</div>
          <table class="third-place-table">
            <thead>
              <tr>
                <th>Rank</th><th>Group</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th><th>Form</th>
              </tr>
            </thead>
            <tbody>
              ${thirdPlaceTeams.map((r, i) => {
                const groupDone = groupCompleteStatus[r.group];
                const isInTop8 = i < 8;
                const hasRemainingMatches = !groupDone;
                const isSafeInWorstCase = worstCaseTop8.has(r.name);
                
                // Can this team reach top 8 in their best-case scenario?
                const teamCanReachTop8 = !isTeamEliminated(r.name);
                
                let cls, statusIcon, statusLabel;
                if (hasRemainingMatches) {
                  // Team has matches left to play
                  cls = '';
                  statusIcon = '⏳';
                  statusLabel = 'Still competing';
                } else if (isInTop8 && isSafeInWorstCase) {
                  // In top 8 and mathematically safe even in worst case
                  cls = 'qualified';
                  statusIcon = '✅';
                  statusLabel = 'Confirmed';
                } else if (isInTop8 && !isSafeInWorstCase) {
                  // In top 8 but could be pushed out in worst case
                  cls = 'provisional';
                  statusIcon = '⏳';
                  statusLabel = 'Provisionally qualified';
                } else if (!isInTop8 && !teamCanReachTop8) {
                  // Cannot reach top 8 even in best case
                  cls = 'eliminated';
                  statusIcon = '❌';
                  statusLabel = 'Eliminated';
                } else {
                  // Not in top 8 but could theoretically reach it
                  cls = '';
                  statusIcon = '⏳';
                  statusLabel = 'Still competing';
                }
                
                return `
                  <tr class="${cls}">
                    <td>${statusIcon} ${i + 1}</td>
                    <td><span class="group-label">${r.group}</span></td>
                    <td>
                      <span class="team-name">
                        <span class="flag">${flagFor(r.name)}</span>
                        ${shortName(r.name)}
                      </span>
                    </td>
                    <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
                    <td>${r.gd > 0 ? '+' : ''}${r.gd}</td>
                    <td><strong>${r.pts}</strong></td>
                    <td class="form">${renderForm(r.form)}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
          <div class="third-place-note">
            ✅ Confirmed: mathematically safe | ⏳ Provisional: in top 8 but could be pushed out | ⏳ Still competing: matches remaining | ❌ Eliminated: cannot reach top 8
          </div>
        </div>
      `;
    }

    // ===== Compute qualified teams for knockout bracket =====
    function getQualifiedTeamMap() {
      const allGroups = Object.keys(WC_DATA.groups);
      const groupWinners = {}; // 1A, 2A, etc.
      const thirdPlaceTeams = [];
      
      allGroups.forEach(group => {
        const groupMatches = WC_DATA.matches.filter(m => m.group === group);
        const groupStarted = groupMatches.some(m => m.played);
        
        if (!groupStarted) return;
        
        const standings = computeStandings(group, WC_DATA.groups[group], WC_DATA.matches);
        if (standings.length >= 2) {
          groupWinners[`1${group}`] = standings[0].name;
          groupWinners[`2${group}`] = standings[1].name;
        }
        if (standings.length >= 3) {
          thirdPlaceTeams.push({ ...standings[2], group });
        }
      });
      
      // Sort 3rd place teams by points, GD, GF, name
      thirdPlaceTeams.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.gd !== a.gd) return b.gd - a.gd;
        if (b.gf !== a.gf) return b.gf - a.gf;
        return a.name.localeCompare(b.name);
      });
      
      // Map top 8 third-place teams to 3A, 3B, 3C, etc. based on their group letter
      const top8ThirdPlace = thirdPlaceTeams.slice(0, 8);
      top8ThirdPlace.forEach(t => {
        groupWinners[`3${t.group}`] = t.name;
      });
      
      return groupWinners;
    }
    
    // Resolve a team label like "1A", "2B", "3A/B/C/D" to actual team name
    // Uses a global assignment tracker to ensure each 3rd-place team appears only once
    function resolveTeamLabel(label, qualifiedMap, thirdPlaceAssignments) {
      // Direct group position: 1A, 2B, 3C, etc.
      const directMatch = label.match(/^(1|2|3)([A-L])$/);
      if (directMatch) {
        const key = `${directMatch[1]}${directMatch[2]}`;
        return qualifiedMap[key] || label;
      }
      
      // 3rd place from multiple groups: 3A/B/C/D, 3C/D/F/G/H, etc.
      const thirdPlaceMatch = label.match(/^3([A-L](?:\/[A-L])*)$/);
      if (thirdPlaceMatch) {
        const groupLetters = thirdPlaceMatch[1].split('/');
        
        // Find the first qualifying 3rd-place team from these groups that hasn't been assigned yet
        const allGroups = Object.keys(WC_DATA.groups);
        const thirdPlaceTeams = [];
        
        allGroups.forEach(group => {
          const groupMatches = WC_DATA.matches.filter(m => m.group === group);
          const groupStarted = groupMatches.some(m => m.played);
          if (!groupStarted) return;
          
          const standings = computeStandings(group, WC_DATA.groups[group], WC_DATA.matches);
          if (standings.length >= 3) {
            thirdPlaceTeams.push({ ...standings[2], group });
          }
        });
        
        thirdPlaceTeams.sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          if (b.gd !== a.gd) return b.gd - a.gd;
          if (b.gf !== a.gf) return b.gf - a.gf;
          return a.name.localeCompare(b.name);
        });
        
        // Find first team in top 8 from the listed groups that hasn't been assigned yet
        const top8 = thirdPlaceTeams.slice(0, 8);
        for (const t of top8) {
          if (groupLetters.includes(t.group) && !thirdPlaceAssignments.has(t.name)) {
            thirdPlaceAssignments.add(t.name);
            return t.name;
          }
        }
        
        // If all qualifying teams from these groups are already assigned, 
        // return the first one (fallback for edge cases)
        for (const t of top8) {
          if (groupLetters.includes(t.group)) {
            return t.name;
          }
        }
        return label;
      }
      
      // Winner/Loser references: W74, L101, etc.
      const winnerMatch = label.match(/^W(\d+)$/);
      if (winnerMatch) return label; // Can't resolve until match is played
      
      const loserMatch = label.match(/^L(\d+)$/);
      if (loserMatch) return label; // Can't resolve until match is played
      
      return label;
    }

    // ===== Render knockout bracket =====
    function renderBracket() {
      const bracket = document.getElementById('bracket');
      bracket.innerHTML = '';
      
      // Compute qualified teams once for all match boxes
      const qualifiedMap = getQualifiedTeamMap();
      // Track which 3rd-place teams have been assigned to prevent duplicates
      const thirdPlaceAssignments = new Set();

      const wrapper = document.createElement('div');
      wrapper.className = 'knockout-wrapper';

      wrapper.innerHTML = `
        <div class="knockout-half left">
          ${buildSide([74, 75, 76, 79, 73, 78, 77, 80], [89, 90, 91, 92], [97, 98], false, qualifiedMap, thirdPlaceAssignments)}
        </div>
        <div class="ko-center">
          ${buildCenter(qualifiedMap, thirdPlaceAssignments)}
        </div>
        <div class="knockout-half right">
          ${buildSide([81, 82, 85, 87, 83, 84, 86, 88], [93, 94, 95, 96], [99, 100], true, qualifiedMap, thirdPlaceAssignments)}
        </div>
      `;

      bracket.appendChild(wrapper);

      // Draw connector lines after layout is fully settled
      // Use setTimeout to ensure fonts and all elements have rendered
      setTimeout(() => drawConnectors(bracket), 100);
      
      // Remove old resize listener if exists, then add new one
      if (window._bracketResizeHandler) {
        window.removeEventListener('resize', window._bracketResizeHandler);
      }
      window._bracketResizeHandler = () => drawConnectors(bracket);
      window.addEventListener('resize', window._bracketResizeHandler);
    }

    function getMatch(num) {
      return WC_DATA.knockouts.find(k => k.num === num);
    }

    function buildSide(r32Nums, r16Nums, qfNums, reverse = false, qualifiedMap = {}, thirdPlaceAssignments = new Set()) {
      const r32Pairs = [[r32Nums[0], r32Nums[4]], [r32Nums[1], r32Nums[5]], [r32Nums[2], r32Nums[6]], [r32Nums[3], r32Nums[7]]];
      return `
        <div class="ko-side" data-reverse="${reverse}">
          <div class="ko-column r32-col">
            ${r32Pairs.map(pair => `
              <div class="ko-pair" data-match="${pair.join(',')}">
                ${pair.map(n => matchBox(getMatch(n), null, qualifiedMap, thirdPlaceAssignments)).join('')}
              </div>
            `).join('')}
          </div>
          <div class="ko-column r16-col">
            ${r16Nums.map(n => `
              <div class="ko-pair single" data-match="${n}" data-from="${getR16From(n).join(',')}">
                ${matchBox(getMatch(n), null, qualifiedMap, thirdPlaceAssignments)}
              </div>
            `).join('')}
          </div>
          <div class="ko-column qf-col">
            ${qfNums.map(n => `
              <div class="ko-pair single" data-match="${n}" data-from="${getQFFrom(n).join(',')}">
                ${matchBox(getMatch(n), null, qualifiedMap, thirdPlaceAssignments)}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function getR16From(num) {
      // R32 pairs on each side: [pair0], [pair1], [pair2], [pair3]
      // Left side r32Nums: [74, 75, 76, 79, 73, 78, 77, 80]
      //   pair0=[74,73], pair1=[75,78], pair2=[76,77], pair3=[79,80]
      // Right side r32Nums: [81, 82, 85, 87, 83, 84, 86, 88]
      //   pair0=[81,83], pair1=[82,84], pair2=[85,86], pair3=[87,88]
      const map = {
        89: [74, 73], 90: [75, 78], 91: [76, 77], 92: [79, 80],
        93: [81, 83], 94: [82, 84], 95: [85, 86], 96: [87, 88]
      };
      return map[num] || [];
    }

    function getQFFrom(num) {
      const map = { 97: [89, 90], 98: [91, 92], 99: [93, 94], 100: [95, 96] };
      return map[num] || [];
    }

    function buildCenter(qualifiedMap = {}, thirdPlaceAssignments = new Set()) {
      const sf1 = getMatch(101), sf2 = getMatch(102);
      const f = getMatch(104), tp = getMatch(103);
      return `
        <div class="ko-center">
          <div class="ko-pair single final" data-match="104" data-from="101,102">
            ${matchBox(f, 'FINAL', qualifiedMap, thirdPlaceAssignments)}
          </div>
          <div class="sf-row">
            <div class="ko-pair single sf" data-match="101" data-from="97,98">
              ${matchBox(sf1, 'SEMIFINAL 1', qualifiedMap, thirdPlaceAssignments)}
            </div>
            <div class="ko-pair single sf" data-match="102" data-from="99,100">
              ${matchBox(sf2, 'SEMIFINAL 2', qualifiedMap, thirdPlaceAssignments)}
            </div>
          </div>
          <div class="ko-pair single third" data-match="103" data-from="101,102">
            ${matchBox(tp, 'THIRD-PLACE MATCH', qualifiedMap, thirdPlaceAssignments)}
          </div>
        </div>
      `;
    }

    function matchBox(m, overrideTitle, qualifiedMap, thirdPlaceAssignments) {
      if (!m) return '';
      const title = overrideTitle || `${m.round === 'R32' ? 'R32' : m.round === 'R16' ? 'R16' : m.round} — M${m.num}`;
      const dateVenue = `${m.date || ''} · ${m.time} UTC${m.utcOffset} · ${m.venue}`;
      
      // Resolve team placeholders to actual names where known
      const homeTeam = resolveTeamLabel(m.home, qualifiedMap, thirdPlaceAssignments);
      const awayTeam = resolveTeamLabel(m.away, qualifiedMap, thirdPlaceAssignments);
      
      return `
        <div class="ko-match-box" data-match="${m.num}">
          <div class="ko-match-title">${title}</div>
          <div class="ko-match-date">${dateVenue}</div>
          <div class="ko-team-row"><span class="flag">${flagOrLabel(homeTeam)}</span> <span>${homeTeam}</span></div>
          <div class="ko-team-row"><span class="flag">${flagOrLabel(awayTeam)}</span> <span>${awayTeam}</span></div>
        </div>
      `;
    }

    function drawConnectors(container) {
      const wrapper = container.querySelector('.knockout-wrapper');
      if (!wrapper) return;
      
      // Skip if wrapper is not visible (getBoundingClientRect returns 0)
      const wrapperRect = wrapper.getBoundingClientRect();
      if (wrapperRect.width === 0 || wrapperRect.height === 0) return;

      let svg = wrapper.querySelector('.bracket-svg');
      if (!svg) {
        svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.classList.add('bracket-svg');
        wrapper.appendChild(svg);
      }
      svg.innerHTML = '';

      function mid(el) {
        const r = el.getBoundingClientRect();
        return {
          x: r.left + r.width / 2 - wrapperRect.left,
          y: r.top + r.height / 2 - wrapperRect.top,
          right: r.right - wrapperRect.left,
          left: r.left - wrapperRect.left,
          top: r.top - wrapperRect.top,
          bottom: r.bottom - wrapperRect.top
        };
      }

      function squarePath(x1, y1, x2, y2) {
        const midX = (x1 + x2) / 2;
        return `M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`;
      }

      const links = [];
      wrapper.querySelectorAll('[data-from]').forEach(targetPair => {
        const fromNums = targetPair.dataset.from.split(',').map(Number);
        const targetBox = targetPair.querySelector('.ko-match-box');
        const t = mid(targetBox);
        fromNums.forEach(num => {
          const sourceBox = wrapper.querySelector(`.ko-match-box[data-match="${num}"]`);
          if (sourceBox) {
            const s = mid(sourceBox);
            const isRightSide = sourceBox.closest('.knockout-half.right') || targetPair.closest('.knockout-half.right');
            const isCenter = targetPair.closest('.ko-center');
            const x1 = isRightSide ? s.left : s.right;
            const x2 = isRightSide ? t.right : t.left;

            if (isCenter) {
              const sourceIsCenter = sourceBox.closest('.ko-center');
              if (sourceIsCenter) {
                // Center-to-center: SF → Final/3P
                // Determine if target is above or below source
                const targetIsAbove = t.y < s.y;
                const targetIsBelow = t.y > s.y;
                
                if (targetIsAbove) {
                  // Target (Final) is above source (SF)
                  // Connect from source top edge to target bottom edge
                  // SF 101 (left) → left side of Final, SF 102 (right) → right side
                  const targetEdgeX = s.x < t.x ? t.left + (t.x - t.left) * 0.5 : t.x + (t.right - t.x) * 0.5;
                  links.push(`M ${s.x} ${s.top} L ${targetEdgeX} ${s.top} L ${targetEdgeX} ${t.bottom}`);
                } else if (targetIsBelow) {
                  // Target (3P) is below source (SF)
                  // Connect from source bottom edge to target top edge
                  // SF 101 (left) → left side of 3P, SF 102 (right) → right side
                  const targetEdgeX = s.x < t.x ? t.left + (t.x - t.left) * 0.5 : t.x + (t.right - t.x) * 0.5;
                  links.push(`M ${s.x} ${s.bottom} L ${targetEdgeX} ${s.bottom} L ${targetEdgeX} ${t.top}`);
                }
              } else {
                // Side-to-center: QF → SF
                // Use squarePath like side column connectors
                const x1 = isRightSide ? s.left : s.right;
                const x2 = isRightSide ? t.right : t.left;
                links.push(squarePath(x1, s.y, x2, t.y));
              }
            } else {
              links.push(squarePath(x1, s.y, x2, t.y));
            }
          }
        });
      });

      svg.setAttribute('width', wrapperRect.width);
      svg.setAttribute('height', wrapperRect.height);
      svg.setAttribute('viewBox', `0 0 ${wrapperRect.width} ${wrapperRect.height}`);

      links.forEach(d => {
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', d);
        p.setAttribute('fill', 'none');
        p.setAttribute('stroke', '#94a3b8');
        p.setAttribute('stroke-width', '2');
        svg.appendChild(p);
      });
    }

    function flagOrLabel(label) {
      if (label.startsWith('W') || label.startsWith('L') || label.includes('/')) return '🏳';
      const code = COUNTRY_CODES[label];
      return code ? getFlag(code) : '🏳';
    }

    // ===== Tabs =====
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
        
        // Redraw bracket connectors when switching to knockout tab
        // (elements need to be visible for getBoundingClientRect to work)
        if (tab.dataset.panel === 'knockoutPanel') {
          setTimeout(() => drawConnectors(document.getElementById('bracket')), 50);
        }
      });
    });

    // ===== Init =====
    loadAndRender();
    
    // Redraw bracket connectors after all resources load
    window.addEventListener('load', () => {
      setTimeout(() => drawConnectors(document.getElementById('bracket')), 200);
    });
  </script>
</body>
</html>
